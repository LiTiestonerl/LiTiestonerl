name: Generate Dog Running on Contribution Grid

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write    # 👈 Dòng này cực kỳ quan trọng

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install Pillow

      - name: Generate dog GIF
        run: python .github/scripts/generate_dog.py

      - name: Commit and push GIF
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🐶 Chú chó chạy mỗi ngày"
          file_pattern: output/dog-run.gif